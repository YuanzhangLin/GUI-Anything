# backend/config.yml
app:
  project_name: "GUI-Anything"
  debug: true

# 默认使用的模型
active_model: "deepseek"

llm_providers:
  deepseek:
    name: "DeepSeek"
    api_key: ""
    base_url: "https://api.deepseek.com"
    model_name: "deepseek-chat"
    temperature: 0.7

  openai:
    name: "OpenAI"
    api_key: "YOUR_OPENAI_KEY"
    base_url: "https://api.openai.com/v1"
    model_name: "gpt-4-turbo"
    temperature: 0.5

# 静态分析数据路径
data_paths:
  map_json: "data/mapData.json"