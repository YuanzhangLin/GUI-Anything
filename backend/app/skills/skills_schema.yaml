# backend/app/skills/skills_schema.yaml
- type: "function"
  function:
    name: "get_github_issues"
    description: "获取仓库最近的 Issue 列表，用于了解已知缺陷的概况。支持指定返回条数。"
    parameters:
      type: "object"
      properties:
        repo_url: {type: "string", description: "仓库地址"}
        limit: {type: "integer", description: "条数,默认5,最大50"}
      required: ["repo_url"]

- type: "function"
  function:
    name: "get_github_issue_details"
    description: "获取指定 Issue 的详细正文和评论内容，用于深入分析具体的报错原因。"
    parameters:
      type: "object"
      properties:
        repo_url: {type: "string", description: "仓库地址"}
        issue_number: {type: "integer", description: "Issue 编号"}
      required: ["repo_url", "issue_number"]

- type: "function"
  function:
    name: "repo_list_files"
    description: "列出已下载到本地的仓库文件（基于 app_id），用于定位项目结构与关键文件。"
    parameters:
      type: "object"
      properties:
        app_id: {type: "string", description: "项目 ID（对应 /app/repos/<app_id>）"}
        limit: {type: "integer", description: "最多返回文件数，默认400，最大5000"}
      required: ["app_id"]

- type: "function"
  function:
    name: "repo_search"
    description: "在本地已下载仓库中搜索关键字（基于 app_id），返回匹配的文件路径与行号。"
    parameters:
      type: "object"
      properties:
        app_id: {type: "string", description: "项目 ID（对应 /app/repos/<app_id>）"}
        query: {type: "string", description: "要搜索的关键字/正则（ripgrep 语法）"}
        glob: {type: "string", description: "文件过滤 glob（可选，例如 **/*.kt 或 **/*.java）"}
        limit: {type: "integer", description: "最多返回匹配条目数，默认50，最大200"}
      required: ["app_id", "query"]

- type: "function"
  function:
    name: "repo_read_file"
    description: "读取本地已下载仓库中的某个文件内容（会自动截断），用于让模型直接分析源码。"
    parameters:
      type: "object"
      properties:
        app_id: {type: "string", description: "项目 ID（对应 /app/repos/<app_id>）"}
        path: {type: "string", description: "仓库内相对路径，例如 app/src/main/AndroidManifest.xml"}
        max_chars: {type: "integer", description: "最多读取字符数，默认12000，最大40000"}
      required: ["app_id", "path"]